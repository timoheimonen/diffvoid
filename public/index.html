<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Secure online text comparison tool - compare and diff texts side by side with diffvoid.com">
    <meta name="keywords" content="text comparison, diff, text diff, compare texts, diffvoid">
    <meta name="author" content="Timo Heimonen">
    <meta name="version" content="1.0.4">
    <meta name="theme-color" content="#1a1a2e">
    <meta property="og:title" content="diffvoid.com - Secure Text Comparison">
    <meta property="og:description" content="Secure online text comparison tool - compare and diff texts side by side">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://diffvoid.com">
    <title>diffvoid.com</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script>
        (function () {
            var saved = localStorage.getItem('diffvoidcom_theme');
            document.documentElement.setAttribute('data-theme', saved === 'dark' ? 'dark' : 'light');
        })();
    </script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="header-left">
            <h1>diffvoid.com - your secure place to compare texts</h1>
            <div class="header-links">
                <a href="tos.html">Terms of Service</a>
                <span class="link-separator">|</span>
                <a href="privacy.html">Privacy</a>
                <span class="link-separator">|</span>
                <a href="about.html">About</a>
            </div>
        </div>
        <div class="mismatch-counter" id="mismatch-counter" style="display: none;"></div>
        <div class="header-actions">
            <button id="clear-button" aria-label="Clear all text">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                </svg>
            </button>
            <button id="theme-toggle" aria-label="Toggle dark mode">
                <svg class="sun-icon" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
                <svg class="moon-icon" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
        </div>
    </header>
    <main>
        <div id="input-left" class="text-field" contenteditable="true" spellcheck="false" data-placeholder="To this...">
        </div>
        <div class="divider" id="divider"></div>
        <div id="input-right" class="text-field" contenteditable="true" spellcheck="false"
            data-placeholder="Compare this..."></div>
    </main>
    <script src="script.js"></script>
</body>

</html>
